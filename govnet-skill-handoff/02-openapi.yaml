openapi: 3.0.3
info:
  title: EMG (Epistemic Market Gauge) API
  description: |
    REST API for the Governance WorkNet of the AWP ecosystem.

    All state-changing endpoints require signed requests. See `/v1/auth/info` for signing format.

    WebSocket API is documented separately in `asyncapi.yaml`.

    ---

    ## Conventions (ADR-014)

    **Writes are async.** `POST` / `DELETE` endpoints return `202 Accepted` after
    the matcher has durably logged the request to its WAL (ADR-012). Subsequent
    state changes (fills, state updates) arrive via the WebSocket real-time path —
    see `asyncapi.yaml`. Clients needing to track fill progression should subscribe
    to `fills.me` / `account` instead of polling REST.

    **Errors use `application/problem+json`** (RFC 7807). Every 4xx response
    carries a `type` URL (stable), a `code` (ADR-006 codebook), and instance-specific
    detail. Clients dispatch on `code` or `type`, not status code alone.

    **Pagination is cursor-based.** List endpoints return `{ data, pagination }`
    where `pagination.next_cursor` is opaque — clients pass it back unmodified.
    Offsets are not supported (unsafe under concurrent inserts).

    **Idempotency** via `X-Idempotency-Key` header (Stripe-style). Key must be
    unique per request intent; re-use with a different body returns `422`.

    **API evolvability.** `/v1/` is forward-compatible only: new optional request
    fields, new response fields (clients ignore unknowns), new endpoints. Never
    removes or renames. Breaking changes require `/v2/` with deprecation notice.

    ---

    ## Standard response headers

    Every response includes:

    | Header | Purpose |
    |---|---|
    | `X-API-Version` | Server version (e.g., `1.3.0`) for feature detection |
    | `X-Request-Id` | Correlation ID for logs / support |
    | `X-Read-Tier` | `1` / `2` / `3` per ADR-013 read-path tier |
    | `X-Cache-Status` | `hit` / `miss` / `miss-fallback` (tier-2 only) |
    | `X-State-Timestamp` | ISO-8601 as-of moment of returned data |
    | `X-Consistency` | `eventual` / `strong` |
    | `X-RateLimit-Limit` | Requests allowed in current window |
    | `X-RateLimit-Remaining` | Requests remaining in current window |
    | `X-RateLimit-Reset` | Unix seconds when window resets |
    | `X-RateLimit-Bucket` | Which bucket this request counted against |

    ---

    ## Middleware-injected error responses

    Two error responses are produced by middleware *before* the
    handler runs, and apply to every route in the relevant class
    rather than being declared on each operation:

    - **`401 Unauthorized`** — emitted by the auth middleware on
      every authenticated route (any operation that does NOT
      declare `security: []`). Wire `code` is one of the `AUTH_*`
      codes in §9.5.1 (missing / malformed signature, actor
      mismatch, timestamp skew, nonce-not-greater, delegate
      revoked). See `#/components/responses/Unauthorized`.

    - **`429 Too Many Requests`** — emitted by the rate-limit
      middleware on every route (public reads included). Wire
      `code` is `RATE_LIMIT_EXCEEDED`; response carries the
      `Retry-After` header plus the `X-RateLimit-*` triplet.
      See `#/components/responses/TooManyRequests`.

    Per-operation `responses:` blocks below list only the
    *handler-emitted* status codes; treat 401 (when authenticated)
    and 429 (always) as implicit on every operation. SDK
    generators that need every code explicitly should expand the
    referenced shared components into each operation as a
    post-processing step.
  version: 1.0.0
  contact:
    name: EMG Protocol
servers:
  - url: https://api.emg.awp.network/v1
    description: Production
  - url: http://localhost:8080/v1
    description: Local dev

security:
  - signatureV1: []

paths:
  /auth/info:
    get:
      summary: Get authentication info for clients
      description: Returns protocol version, required headers, and server time for time-sync
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthInfo'

  /epochs/current:
    get:
      summary: Get current epoch info
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpochInfo'

  /epochs/{epoch_id}:
    get:
      summary: Get a specific epoch's info
      security: []
      parameters:
        - $ref: '#/components/parameters/EpochId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpochInfo'
        '404':
          $ref: '#/components/responses/NotFound'

  /epochs/{epoch_id}/results:
    get:
      summary: Get settlement results for an epoch
      security: []
      parameters:
        - $ref: '#/components/parameters/EpochId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpochResults'
        '404':
          description: Epoch not yet settled

  /epochs/{epoch_id}/votes:
    post:
      summary: Submit a signed vote
      description: |
        Submit an EIP-712-signed vote containing (vote, prediction, nonce).
        The signature is over an `EMGVote` typed-data struct using the
        Staker's secp256k1 key — the same key used for transport auth.
        Server verifies via ecrecover, requires nonce strictly greater than
        the previous submission's nonce for this (Staker, epoch), then stores
        the vote.
        
        Vote contents remain **private** to the server during Phase 1 and
        Phase 2 — other Stakers and external APIs cannot read them. Contents
        are published at settlement (Tuesday UTC 12:00).
        
        To update a previously submitted vote, call this again with a higher
        nonce. Only the highest-nonce vote per Staker enters the Merkle tree.
      parameters:
        - $ref: '#/components/parameters/EpochId'
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignedVoteRequest'
      responses:
        '202':
          description: Vote accepted and durably logged to WAL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteReceipt'
        '401':
          description: |
            Body-level vote signature (`EMGVote` typed data) failed
            to recover to the request `actor`. Distinct from the
            transport-level EMG-SIG-V1 401 — that one is injected by
            auth middleware against the `EMGRequest` typed data
            before this handler runs. The body-sig 401 fires when
            the transport sig was valid but the per-vote
            `signature` field over the EMGVote struct doesn't
            recover to the `principal`. Wire codes:
            `AUTH_MALFORMED_SIGNATURE` or `AUTH_ACTOR_MISMATCH`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: Not in voting phase, or vote epoch does not match current
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            Epoch id in the path does not correspond to any known
            epoch row (`STATE_EPOCH_NOT_FOUND`). Distinct from 403
            phase-mismatch — 403 means the epoch exists but isn't
            currently in voting phase; 404 means the epoch is
            unknown to the server (not yet opened, or beyond
            partition retention).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Nonce not strictly greater than previous submission
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: |
            Vector not a valid probability simplex
            (`VALIDATION_SIMPLEX_CONSTRAINT_VIOLATED`).

            **Note**: vote-signature failures listed in earlier spec
            drafts as 422 are emitted by the implementation as 401
            with `AUTH_ACTOR_MISMATCH` / `AUTH_MALFORMED_SIGNATURE`
            (per §9.5.1 codebook). The 422 was never shipped as a
            wire contract — no back-compat concern; clients must
            handle 401 for vote-signature failures, not 422.

            **Note**: idempotency-key reuse is 409
            `STATE_IDEMPOTENCY_KEY_MISMATCH` (NOT 422 — the §9.4
            spec text suggesting 422 is reconciled to 409 via the
            §9.5.1 codebook). Clients should branch on `code`, not
            status.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    get:
      summary: List votes for an epoch (tier 3 — paginated)
      description: |
        Returns all final (highest-nonce per Staker) votes with full content.
        **Only populated after settlement** (Phase 3). During Phase 1/2, this
        endpoint returns 403 Forbidden.
        
        Agents can read their own vote at any time via GET /v1/principals/{principal}/votes/{epoch_id}.
      security: []
      parameters:
        - $ref: '#/components/parameters/EpochId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK (settlement complete)
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RevealedVote'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '403':
          description: Votes not yet public (epoch still in Phase 1 or Phase 2)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            Epoch id does not correspond to any known epoch
            (`STATE_EPOCH_NOT_FOUND`). Returned when the path
            `epoch_id` is unknown to the server (not yet opened or
            beyond partition retention). Distinct from 403, which
            requires the epoch to exist but be in a pre-settlement
            phase.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /epochs/{epoch_id}/voters:
    get:
      summary: List Stakers that submitted votes (tier 3 — paginated)
      description: |
        Returns the list of Staker IDs that have submitted at least one vote
        in this epoch, with their latest nonce and timestamp. Vote **contents**
        are not included — use GET /votes for that (post-settlement only).
        
        Callable in any phase. Useful for participation dashboards.
      security: []
      parameters:
        - $ref: '#/components/parameters/EpochId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VoterSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /epochs/{epoch_id}/merkle-root:
    get:
      summary: Get the Merkle root for this epoch's votes
      description: |
        Returns the Merkle root of all final votes for this epoch, computed at
        Phase 1 close (Thursday UTC 12:00). Returns 404 until the root has
        been computed.
        
        The root is also submitted on-chain via the RootNet contract; use that
        for authoritative audit. This endpoint exists for client convenience.
      security: []
      parameters:
        - $ref: '#/components/parameters/EpochId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerkleRootResponse'
        '404':
          description: Root not yet computed (epoch still in Phase 1)

  /epochs/{epoch_id}/votes/{principal}/proof:
    get:
      summary: Get Merkle inclusion proof for an Staker's vote
      description: |
        Returns the Merkle proof that the given Staker's vote is included in the
        epoch's committed Merkle tree. The proof can be verified against the
        on-chain root via the RootNet contract's verifyVoteInclusion().
        
        Returns 404 if the Staker did not submit a vote, or if the Merkle root
        has not yet been committed.
      security: []
      parameters:
        - $ref: '#/components/parameters/EpochId'
        - name: principal
          in: path
          required: true
          schema:
            type: string
            format: eth-address
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerkleInclusionProof'
        '400':
          description: |
            Path `principal` segment is not a valid 20-byte hex
            address (`VALIDATION_MALFORMED_JSON`).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: |
            Reveal gate not yet fired (`STATE_VOTES_NOT_REVEALED`):
            the epoch is still in Phase 1 (`VotingAndTrading`) or
            Phase 2 (`TradingOnly`) and the `vote_merkle_commitments`
            row hasn't been inserted at the Phase 2 → Phase 3
            boundary. Distinct from 404 — the principal's
            participation is intentionally hidden until reveal.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            Reveal gate fired but the queried principal didn't
            submit a final vote in this epoch
            (`STATE_VOTE_NOT_FOUND`). The handler verifies
            `merkle_root(stored_leaves) == commitment.merkle_root`
            BEFORE the principal-not-found lookup, so a corrupted
            DB always surfaces as 500 (never as a misleading 404).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /epochs/{epoch_id}/votes/{principal}/history:
    get:
      summary: Get a Staker's full vote submission history in this epoch (tier 3 — paginated)
      description: |
        Returns all votes (not just the final one) submitted by this Staker in
        this epoch, ordered by nonce ascending. Only available after settlement.
        
        Useful for auditing vote-evolution behavior.
      security: []
      parameters:
        - $ref: '#/components/parameters/EpochId'
        - name: principal
          in: path
          required: true
          schema:
            type: string
            format: eth-address
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK (post-settlement)
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RevealedVote'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: |
            Path `principal` segment is not a valid 20-byte hex
            address (`VALIDATION_MALFORMED_JSON`).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: Votes not yet public
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            Epoch id does not correspond to any known epoch
            (`STATE_EPOCH_NOT_FOUND`). Distinct from 403 — 404
            means the epoch is unknown to the server, 403 means
            the epoch exists but its votes aren't yet public.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /epochs/{epoch_id}/phase:
    get:
      summary: Get the current lifecycle phase of an epoch
      description: |
        Returns which phase of the Epoch is currently active. Polling this is
        the simplest way for clients to decide whether voting or trading
        endpoints will accept their requests. For live updates, subscribe to
        the `phase` WebSocket channel instead.
      security: []
      parameters:
        - $ref: '#/components/parameters/EpochId'
      responses:
        '200':
          description: Phase info
          content:
            application/json:
              schema:
                type: object
                required: [epoch_id, phase, phase_started_at, next_transition_at]
                properties:
                  epoch_id:
                    type: integer
                    format: int64
                  phase:
                    type: string
                    enum: [VotingAndTrading, TradingOnly, Settlement, Reporting]
                    description: |
                      - `VotingAndTrading` (Wed 12:00 UTC → Thu 12:00 UTC): vote and trade
                      - `TradingOnly`       (Thu 12:00 UTC → Tue 12:00 UTC): trade only
                      - `Settlement`        (Tue 12:00 UTC → Wed 11:30 UTC): settlement pipeline running
                      - `Reporting`         (Wed 11:30 UTC → next Wed 12:00 UTC): read-only window
                  phase_started_at:
                    type: string
                    format: date-time
                  next_transition_at:
                    type: string
                    format: date-time
                    description: UTC timestamp of the next scheduled phase boundary
                  next_phase:
                    type: string
                    enum: [VotingAndTrading, TradingOnly, Settlement, Reporting]
                    nullable: true
                    description: |
                      The phase that follows `phase` within this same
                      epoch. `null` when `phase` is `Reporting` — the
                      next boundary belongs to the *next epoch's*
                      `VotingAndTrading` rather than a new phase
                      within this epoch. Clients reading
                      `next_phase: null` know to roll to the next
                      epoch_id at `next_transition_at`.
        '404':
          $ref: '#/components/responses/NotFound'

  /orders:
    get:
      summary: List orders (tier 2 — cursor-paginated)
      parameters:
        - name: principal
          in: query
          schema:
            type: string
            format: eth-address
        - name: epoch_id
          in: query
          schema:
            type: integer
        - name: worknet_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [active, partially_filled, filled, cancelled, expired, rejected]
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderResponse'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: |
            `?principal=` query parameter does not match the
            authenticated principal (`VALIDATION_MALFORMED_JSON`).
            The Manager-on-behalf-of-Staker pattern uses the
            `X-EMG-Principal` header (validated by the auth layer);
            the querystring filter is a defense-in-depth check that
            never broadens visibility past what the auth layer
            authorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    post:
      summary: Submit a trading order
      description: |
        Submit a buy or sell order. Smart routing is applied automatically —
        the system selects the cheapest execution path (direct order book or synthesis).

        **Response semantics** (ADR-014): this endpoint is asynchronous. A `202 Accepted`
        means the matcher has durably persisted the order to its WAL (ADR-012). Any fills
        that executed synchronously during order intake are included in `initial_fills`.
        Subsequent fills arrive via the WebSocket `fills.me` subscription — clients that
        need to track fill progression MUST subscribe there; polling `GET /v1/orders/{id}`
        repeatedly is discouraged.

        Optional header `X-Idempotency-Key` for safe retries (Stripe-style semantics).
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 255
          description: |
            Client-chosen idempotency token (UUIDv7 recommended). Server caches the response
            for 24h keyed by `(principal, key)`. Re-submission with the same key and same body
            returns the cached response; same key with different body returns
            `409 STATE_IDEMPOTENCY_KEY_MISMATCH` (the §9.5.1 codebook canonicalizes the
            spec §9.4 step 5 example's 422 to 409; the wire emits 409).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '202':
          description: |
            Order accepted and durably logged to WAL. Any synchronous fills are in `initial_fills`;
            further fills will arrive via WebSocket `fills.me`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderAcceptedResponse'
        '400':
          description: Malformed request (unparseable, missing required fields)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: |
            State conflict — post-only would cross, STP triggered, or epoch phase disallows submission
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: |
            Semantic validation failure — insufficient balance, tick size mismatch,
            min notional, WorkNet retired. Idempotency-key reuse is 409
            `STATE_IDEMPOTENCY_KEY_MISMATCH` (see the X-Idempotency-Key parameter
            description above), NOT 422.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /orders/{order_id}:
    get:
      summary: Get order by ID (tier 2 — cached; subscribe for real-time)
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '403':
          description: |
            Order exists but is owned by a different principal
            (`BUSINESS_ORDER_NOT_OWNED`). Distinct code from 404
            `BUSINESS_ORDER_NOT_FOUND` — clients can tell
            forgotten-id from not-yours.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            Order id unknown to the server (never existed, or the
            partition retention policy dropped it). Code:
            `BUSINESS_ORDER_NOT_FOUND`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

    delete:
      summary: Cancel an order
      description: |
        Requests cancellation of the specified order. The response is a **cancel receipt**
        (ADR-014 §2) that describes the actual outcome — the order may have been partially
        or fully filled by the time the cancel was processed.

        Check `status` to determine what happened:
        - `cancelled` — order was fully cancelled; nothing filled
        - `partially_filled_then_cancelled` — some quantity filled before cancel took effect
        - `already_fully_filled` — cancel arrived after complete fill (no-op)
        - `already_cancelled` — redundant cancel (no-op)
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Cancel processed. Inspect `status` for actual outcome.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelReceipt'
        '403':
          description: |
            Order exists but is owned by a different principal
            (`BUSINESS_ORDER_NOT_OWNED`). Distinct from 404 so
            clients can tell forgotten-id from not-yours, the same
            distinction the matching `GET /orders/{order_id}`
            block makes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Order not found (never existed or retention dropped it)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /orders/cancel-batch:
    post:
      summary: Cancel multiple orders in one call
      description: |
        Cancel up to 500 orders in a single call. Each returns its own cancel receipt.
        Cancels are processed independently — a failure on one does not stop others.

        Rate-limited under bucket `orders-cancel` (separate from submit), so bulk cancels
        do not consume the submit quota.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_ids]
              properties:
                order_ids:
                  type: array
                  maxItems: 500
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: |
            All cancels processed; inspect each result.
            Cancels are processed independently — per-id failures
            (unknown order id, not-owned-by-this-principal) land as
            error rows in the same `results` array, NOT as the
            request-level HTTP envelope. Clients SHOULD branch on
            each result's shape: a `CancelReceipt` for success,
            a `CancelBatchError` for failures.
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/CancelReceipt'
                        - $ref: '#/components/schemas/CancelBatchError'
        '400':
          description: |
            Malformed body, empty `order_ids`, or `order_ids` length
            > 500 (`VALIDATION_MALFORMED_JSON`).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /orders/cancel-all:
    post:
      summary: Cancel all active orders for the authenticated Principal
      description: |
        Cancels every active and partially-filled order for the authenticated Principal.
        Optional `worknet_id` filter to cancel only within one WorkNet.

        Rate-limited under bucket `orders-cancel`. Returns a summary of how many were
        cancelled; individual cancel receipts are NOT returned (use /cancel-batch for that).
      parameters:
        - name: worknet_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: |
            Bulk cancel completed. Always 200 OK — partial progress is
            reflected in `cancelled_count`, and any matcher dispatch
            error during the call is surfaced via the optional
            `partial_error` field rather than as an HTTP error
            envelope (mirrors `/cancel-batch`'s per-id error pattern).
            This means the client never sees `cancelled_count` hidden
            behind a 503/429: a retry's `not_cancellable_count` won't
            be inflated by orders the previous call already cancelled.
          content:
            application/json:
              schema:
                type: object
                required: [cancelled_count, not_cancellable_count, processed_at]
                properties:
                  cancelled_count:
                    type: integer
                  not_cancellable_count:
                    type: integer
                  processed_at:
                    type: string
                    format: date-time
                  partial_error:
                    description: |
                      Set iff at least one matcher dispatch errored
                      while the call was in progress. The summary
                      counts above reflect partial progress made
                      before the error surfaced. Cancel is
                      idempotent — clients retry against the
                      residual.
                    type: object
                    required: [code, detail]
                    properties:
                      code:
                        type: string
                        description: §9.5.1 codebook entry for the first matcher error.
                      detail:
                        type: string
                        description: Human-readable diagnostic from the error envelope.

  /positions/split:
    post:
      summary: Split chips into an N-tuple of outcome shares
      description: |
        Executes the Polymarket-style Split primitive: 1 chip → N shares (one per WorkNet).
        No counterparty needed.

        Async write (ADR-014 §1): `202 Accepted` returned after matcher's WAL commit.
        Subsequent state updates arrive via the WebSocket `account` subscription.
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: string
                  description: Decimal quantity of chips to split
                  example: "10.0"
      responses:
        '202':
          description: Split accepted and durably logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StakerEpochState'
        '400':
          description: |
            Malformed request body or invalid quantity (≤ 0):
            `VALIDATION_INVALID_QUANTITY` / `VALIDATION_MALFORMED_JSON`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: |
            Insufficient chips for the requested split (`BUSINESS_INSUFFICIENT_BALANCE`).
            Codebook §9.5.1 maps this code to 409; the matching response on
            `POST /positions/merge` is similarly 409 for `BUSINESS_INSUFFICIENT_SHARES`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: |
            Idempotency-key reuse (`STATE_IDEMPOTENCY_KEY_MISMATCH` —
            same `X-Idempotency-Key` reused with a different request body).
            Insufficient-chips cases land in 409 above; bad-quantity cases
            land in 400.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /positions/merge:
    post:
      summary: Merge N shares back to chips
      description: |
        Executes the Polymarket-style Merge primitive: requires at least `quantity`
        shares in every WorkNet.

        Async write (ADR-014 §1): `202 Accepted` returned after matcher's WAL commit.
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: string
                  example: "5.0"
      responses:
        '202':
          description: Merge accepted and durably logged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StakerEpochState'
        '400':
          description: |
            Malformed body or invalid quantity
            (`VALIDATION_MALFORMED_JSON` / `VALIDATION_INVALID_QUANTITY`).
            Symmetric with `POST /positions/split`'s 400.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: |
            Insufficient shares in one or more WorkNets
            (`BUSINESS_INSUFFICIENT_SHARES`). Codebook §9.5.1.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /principals/{principal}/state:
    get:
      summary: Get current Staker epoch state
      parameters:
        - name: principal
          in: path
          required: true
          schema:
            type: string
            format: eth-address
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StakerEpochState'
        '404':
          description: |
            No `principal_current_state` row for this
            (epoch, principal) pair (`STATE_PRINCIPAL_NOT_IN_EPOCH`).
            Returned when the principal had zero AWP Power at
            epoch open (excluded from the snapshot per
            `WorkNet投票协议` §AWP integration rule 3) or when
            `?epoch_id=N` references an epoch the principal
            wasn't part of.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /principals/{principal}/power:
    get:
      summary: Get AWP Power snapshot for a Staker at a specific epoch
      description: |
        Returns the Staker's AWP Power (time-weighted veAWP voting power,
        aggregated across chains) at the given epoch's open snapshot.
        Includes per-chain and per-position (tokenId) breakdown for audit.
        Values are fixed at epoch open (Wed UTC 12:00).
      security: []
      parameters:
        - name: principal
          in: path
          required: true
          schema:
            type: string
            format: eth-address
        - name: epoch_id
          in: query
          required: false
          description: Defaults to current epoch.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalPower'
        '404':
          description: No snapshot exists for this principal at this epoch (no veAWP holdings)

  /principals/{principal}/managers:
    get:
      summary: List active Managers authorized for a Staker
      description: |
        Returns the addresses authorized via AWPRegistry.grantDelegate(manager)
        for the given Staker. Any of these may submit EMG requests on the
        Staker's behalf.
        Data sourced from api.awp.sh; reflects current chain state, not an
        epoch-pinned snapshot.
      security: []
      parameters:
        - name: principal
          in: path
          required: true
          schema:
            type: string
            format: eth-address
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  principal:
                    type: string
                    format: eth-address
                  managers:
                    type: array
                    items:
                      type: string
                      format: eth-address
                  checked_at:
                    type: string
                    format: date-time

  /principals/{principal}/recipient:
    get:
      summary: Get resolved reward recipient for a Staker at settlement
      description: |
        Returns the address that received Gov Tokens on behalf of this Staker
        for the given epoch's settlement. Result of walking AWPRegistry's
        boundTo chain and reading recipient. Available only after the epoch
        has settled.
      security: []
      parameters:
        - name: principal
          in: path
          required: true
          schema:
            type: string
            format: eth-address
        - name: epoch_id
          in: query
          required: false
          description: Defaults to most recent settled epoch.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  epoch_id:
                    type: integer
                    format: int64
                  principal:
                    type: string
                    format: eth-address
                  recipient_address:
                    type: string
                    format: eth-address
                  is_self:
                    type: boolean
                    description: True if recipient equals principal (no routing).
        '404':
          description: Epoch not yet settled, or Staker earned no Gov Tokens

  /markets/{market_id}/worknets/{worknet_id}/book:
    get:
      summary: Get order book snapshot (tier 2 — Redis-cached, ~100ms lag)
      description: |
        Returns a top-N snapshot of the (`market_id`, `worknet_id`) order
        book. Served from the Redis cache populated by the matcher every
        100ms (ADR-013). For real-time updates, subscribe to the
        WebSocket `book.{market_id}.{worknet_id}` channel instead.
      security: []
      parameters:
        - name: market_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: worknet_id
          in: path
          required: true
          schema:
            type: integer
        - name: depth
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 200
          description: Number of price levels per side. Max 200 (protective limit, ADR-014 §11).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderBookSnapshot'
        '400':
          description: depth out of allowed range
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            No matcher engine is spawned for this `(market_id, worknet_id)`
            pair (market doesn't exist, isn't trading, or the worknet
            isn't part of the market).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /markets/{market_id}/worknets/{worknet_id}/klines:
    get:
      summary: Get K-line data (tier 2 — Redis read-through to continuous aggregates)
      security: []
      parameters:
        - name: market_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: worknet_id
          in: path
          required: true
          schema:
            type: integer
        - name: interval
          in: query
          schema:
            type: string
            # Turn 6 reconciliation: previous spec listed '15m' but
            # the persistence layer's continuous-aggregate views are
            # 1m / 5m / 1h / 4h / 1d. Removed '15m' from the wire
            # enum to match what the server actually accepts. Adding
            # the view is a separate Phase 7+ schema migration; the
            # wire contract leads.
            enum: ['1m', '5m', '1h', '4h']
            default: '1h'
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KLine'
        '404':
          description: |
            No matcher engine is spawned for this `(market_id, worknet_id)`
            pair.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /reports:
    post:
      summary: Submit a WorkNet weekly report
      description: Only WorkNet operators can submit reports for their own WorkNet.
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeeklyReportRequest'
      responses:
        '202':
          description: Report submitted
        '400':
          description: |
            Malformed body (e.g., empty content, negative `worknet_id`,
            oversized content): `VALIDATION_MALFORMED_JSON`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: |
            Same `(epoch_id, worknet_id)` already submitted this epoch.
            The DB enforces "one report per WorkNet per epoch" via the
            UNIQUE constraint; surfaced as `STATE_IDEMPOTENCY_KEY_MISMATCH`
            with `details.previous_hash = "epoch-worknet-collision"`.
            Distinct from middleware-side idempotency-key reuse (also
            409 with the same code), which carries a 64-char hex digest
            in `previous_hash`. Clients dispatching on `details.previous_hash`
            see "epoch-worknet-collision" (handler-side) vs a hex string
            (middleware-side); the leading non-hex character makes the
            two forms unambiguous.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: |
            Repo-side validation failure (e.g., `requested_share` outside
            [0, 1] when present): surfaces as `VALIDATION_MALFORMED_JSON`.
            (The 422 slot stays for future strict semantic-violation codes;
            today most violations land in 400.)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    get:
      summary: List weekly reports (tier 3 — paginated)
      description: |
        At least one of `epoch_id` or `worknet_id` is required. Omitting
        both is rejected with 400 `VALIDATION_MALFORMED_JSON` — a
        cross-table list with no filter would degrade to a full-table
        scan and is never the dashboard query a client actually wants.
      parameters:
        - name: epoch_id
          in: query
          schema:
            type: integer
        - name: worknet_id
          in: query
          schema:
            type: integer
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WeeklyReport'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: |
            Neither `epoch_id` nor `worknet_id` was supplied. The
            cross-table form is intentionally not supported.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /comments:
    post:
      summary: Publish a comment
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '202':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    get:
      summary: List comments (tier 3 — paginated)
      description: |
        Filter axis is exclusive: `worknet_id` and `author_id` MUST NOT be
        combined in the same request — the underlying indexes
        (`idx_comments_worknet_time`, `idx_comments_author`) are
        single-column, and a composite filter would degrade to a seq
        scan. A 400 `VALIDATION_MALFORMED_JSON` is returned for the
        combined form.

        `sort=bridge_score` requires `epoch_id` (the bridge-score index
        is per-epoch) and is exclusive with `author_id` (no per-author
        bridge-score query exists). `epoch_id` is ONLY honored with
        `sort=bridge_score`; combining it with `sort=recent` is rejected
        with 400 `VALIDATION_MALFORMED_JSON` rather than silently
        dropping the filter.
      parameters:
        - name: worknet_id
          in: query
          schema:
            type: integer
        - name: author_id
          in: query
          schema:
            type: string
        - name: epoch_id
          in: query
          schema:
            type: integer
          description: |
            Required when `sort=bridge_score`. Rejected with 400 when
            combined with `sort=recent` (no per-epoch index for the
            recency listing).
        - name: sort
          in: query
          schema:
            type: string
            enum: [recent, bridge_score]
            default: recent
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /comments/{comment_id}/endorse:
    post:
      summary: Mark a comment as helpful
      parameters:
        - name: comment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Endorsed (or no-op if already endorsed)
          content:
            application/json:
              schema:
                type: object
                properties:
                  comment_id:
                    type: string
                    format: uuid
                  was_new_endorsement:
                    type: boolean
                    description: true if this call added an endorsement; false if already endorsed
        '400':
          description: |
            Path `comment_id` segment is not a valid UUID. Emitted
            by axum's `Path<Uuid>` extractor before the handler
            runs, so the 400 short-circuits ahead of the
            comment-existence check.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /leaderboard/epistemic:
    get:
      summary: Top Stakers by epistemic score (tier 3 — paginated)
      security: []
      parameters:
        - name: epoch_id
          in: query
          schema:
            type: integer
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeaderboardEntry'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

components:
  parameters:
    EpochId:
      name: epoch_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 0

    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 100
        maximum: 1000
      description: Maximum items per page. Endpoint-specific maximum applies.

    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: |
        Opaque cursor from the previous page's `pagination.next_cursor`. Omit to start
        from the first page. Cursors are server-generated; clients treat them as opaque
        strings and do not parse them.

  responses:
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    ValidationError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Unauthorized:
      description: |
        EMG-SIG-V1 authentication failed. The wire `code` is one of the
        `AUTH_*` codes in §9.5.1 (missing / malformed signature, actor
        mismatch, timestamp skew beyond ±30s, nonce not strictly
        greater than the stored high-water mark, delegate revoked or
        not authorized). Injected by the auth middleware before the
        handler runs, so every authenticated route can emit it.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    TooManyRequests:
      description: |
        Rate limit exceeded for this principal under the route's
        bucket (see §9.6). Wire `code` is `RATE_LIMIT_EXCEEDED`;
        response carries `Retry-After` header (seconds) plus the
        standard `X-RateLimit-Limit` / `-Remaining` / `-Reset`
        triplet. Injected by the rate-limit middleware, so every
        route can emit it independent of the handler.
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 1
          description: Seconds to wait before retrying.
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  securitySchemes:
    signatureV1:
      type: apiKey
      in: header
      name: X-EMG-Signature
      description: |
        **EMG-SIG-V1** — EIP-712 typed data signature authentication.
        
        Every authenticated request includes four headers:
        - `X-EMG-Principal`: `0x`-prefixed hex, 20-byte Staker address
        - `X-EMG-Actor`: `0x`-prefixed hex, 20 bytes. Optional — defaults to Principal. If Manager is signing, this is the Manager's address.
        - `X-EMG-Nonce`: unsigned decimal integer, monotonic per (Staker, domain)
        - `X-EMG-Timestamp`: unsigned decimal integer, Unix seconds UTC
        - `X-EMG-Signature`: `0x`-prefixed hex, 65-byte ECDSA signature (r||s||v)
        
        **Signed material** is an EIP-712 typed data structure:
        ```solidity
        EMGRequest {
          address principal  // Staker being acted upon
          string  method     // "GET", "POST", "DELETE", "WS_HELLO"
          string  path       // URL path
          string  query      // Canonical query string (keys sorted), empty if none
          bytes32 bodyHash   // keccak256(body); 0x00..00 if empty body
          uint256 nonce      // Strictly greater than principal's previous nonce
          uint256 timestamp  // Unix seconds; ±30s of server time
        }
        ```
        
        With EIP-712 domain:
        ```
        name: "EMG"
        version: "1"
        chainId: <configured>
        verifyingContract: <configured>
        ```
        
        **Signing**: any Ethereum wallet supporting `eth_signTypedData_v4`
        (MetaMask, WalletConnect, Rabby, Safe, hardware wallets) signs EMG
        requests natively. For server-side bots, use `alloy-signer-local` or
        `k256` directly.
        
        **Verification**: server runs `ecrecover(digest, v, r, s)` to obtain the
        signer address, compares it to `X-EMG-Actor`. If `actor == principal`,
        the request is self-authorized. If `actor != principal`, server
        checks `AWPRegistry.delegates(principal, actor)` via emg-chain.
        
        **Replay protection**: nonce must be strictly greater than the highest
        nonce seen for this (principal, chainId, verifyingContract) tuple
        (NOTE: tracked per-principal, not per-actor). Stored
        in Redis with 7-day TTL.
        
        **Optional idempotency**: include `X-Idempotency-Key: <uuid-v7>` on
        mutating requests for safe retry; server caches the response for 24h
        keyed by (principal, key).
        
        See `spec/07-api.md` §9.3 for complete semantics and reference client code.

  schemas:
    AuthInfo:
      type: object
      properties:
        protocol_version:
          type: string
          example: "v4.0"
        server_time_unix:
          type: integer
          format: int64
          example: 1745323200
        signature_scheme:
          type: string
          example: "EMG-SIG-V1-EIP712"
        eip712_domain:
          type: object
          description: EIP-712 domain parameters (client must use these verbatim)
          properties:
            name:
              type: string
              example: "EMG"
            version:
              type: string
              example: "1"
            chainId:
              type: integer
              example: 56
            verifyingContract:
              type: string
              description: 0x-prefixed hex Ethereum address
              example: "0x..."
        eip712_primary_type:
          type: string
          example: "EMGRequest"
        eip712_types:
          type: object
          description: |
            The EMGRequest type definition, suitable for
            eth_signTypedData_v4.
          example:
            EIP712Domain:
              - { name: "name", type: "string" }
              - { name: "version", type: "string" }
              - { name: "chainId", type: "uint256" }
              - { name: "verifyingContract", type: "address" }
            EMGRequest:
              - { name: "principal", type: "address" }
              - { name: "method", type: "string" }
              - { name: "path", type: "string" }
              - { name: "query", type: "string" }
              - { name: "bodyHash", type: "bytes32" }
              - { name: "nonce", type: "uint256" }
              - { name: "timestamp", type: "uint256" }
        max_timestamp_skew_seconds:
          type: integer
          example: 30

    EpochInfo:
      type: object
      required: [id, phase, opened_at, n_worknets]
      properties:
        id:
          type: integer
        phase:
          type: string
          enum: [voting_and_trading, trading_only, settlement, weekly_report, completed]
        opened_at:
          type: string
          format: date-time
        voting_closes_at:
          type: string
          format: date-time
        trading_closes_at:
          type: string
          format: date-time
        settled_at:
          type: string
          format: date-time
          nullable: true
        n_worknets:
          type: integer
        protocol_version:
          type: string

    EpochResults:
      type: object
      properties:
        epoch_id:
          type: integer
        v_vector:
          type: array
          items:
            type: string
            format: decimal
        p_open_vector:
          type: array
          items:
            type: string
            format: decimal
        w_vector:
          type: array
          items:
            type: string
            format: decimal
        total_gov_tokens:
          type: string
          format: decimal

    SignedVoteRequest:
      type: object
      required: [vote, prediction, nonce, signature]
      properties:
        vote:
          type: array
          items:
            type: string
            format: decimal
          description: N-dimensional probability vector (v_a), sums to 1
        prediction:
          type: array
          items:
            type: string
            format: decimal
          description: N-dimensional probability vector (f_a), sums to 1
        nonce:
          type: integer
          format: int64
          minimum: 1
          description: |
            Monotonic counter per (Staker, epoch). Each new submission for
            this (Staker, epoch) must have nonce strictly greater than the
            previous submission's nonce.
        signature:
          type: string
          description: |
            0x-prefixed hex, 65 bytes. secp256k1 ECDSA signature over the
            EIP-712 digest of the `EMGVote` typed-data struct:
            ```
            EMGVote {
              uint64  epoch
              bytes32 voteHash       // keccak256(canonical_bytes(vote))
              bytes32 predictionHash // keccak256(canonical_bytes(prediction))
              uint64  nonce
            }
            ```
            Domain: same as transport auth (EMG / 1 / chainId / verifyingContract).
            Server recovers the signer address via ecrecover and matches it
            against the submitters `X-EMG-Actor`.

    VoteReceipt:
      type: object
      properties:
        epoch_id:
          type: integer
        vote_id:
          type: string
          format: uuid
        leaf_hash:
          type: string
          format: base64
          description: SHA-256 hash of the Merkle leaf for this vote
        nonce:
          type: integer
        received_at:
          type: string
          format: date-time

    RevealedVote:
      type: object
      properties:
        principal:
          type: string
          format: eth-address
        epoch_id:
          type: integer
        vote:
          type: array
          items:
            type: string
            format: decimal
        prediction:
          type: array
          items:
            type: string
            format: decimal
        nonce:
          type: integer
        signature:
          type: string
          format: base64

    VoterSummary:
      type: object
      properties:
        principal:
          type: string
          format: eth-address
        latest_nonce:
          type: integer
        latest_submission_at:
          type: string
          format: date-time

    MerkleRootResponse:
      type: object
      properties:
        epoch_id:
          type: integer
        merkle_root:
          type: string
          format: base64
        vote_count:
          type: integer
        committed_at:
          type: string
          format: date-time
        on_chain_tx_hash:
          type: string
          format: base64
          nullable: true
          description: Transaction hash of the on-chain commit, if already submitted

    MerkleInclusionProof:
      type: object
      properties:
        epoch_id:
          type: integer
        principal:
          type: string
        leaf_hash:
          type: string
          format: base64
        leaf_index:
          type: integer
          description: 0-indexed position of the leaf in the sorted leaf array
        siblings:
          type: array
          items:
            type: string
            format: base64
          description: Sibling hashes from leaf to root (bottom-up)
        merkle_root:
          type: string
          format: base64
          description: The root the proof verifies against

    CreateOrderRequest:
      type: object
      required: [worknet_id, side, quantity]
      properties:
        worknet_id:
          type: integer
        side:
          type: string
          enum: [buy, sell]
        quantity:
          type: string
          format: decimal
          description: Must be a multiple of 0.00000001 (quantity step size)
        limit_price:
          type: string
          format: decimal
          description: |
            If omitted, submitted as a market order. Must be a multiple of
            0.0001 (tick size). Price × quantity must be ≥ 0.001 (min notional).
        kind:
          type: string
          enum: [limit, market]
          default: limit
          description: |
            Derived from limit_price if omitted (limit → limit_price set,
            market → limit_price null).
        time_in_force:
          type: string
          enum: [gtc, ioc, fok, gtt]
          default: gtc
          description: |
            - `gtc` — Good-Til-Cancelled. Default. Rests until filled/cancelled/epoch-end.
            - `ioc` — Immediate-Or-Cancel. Match what you can, cancel rest.
            - `fok` — Fill-Or-Kill. All or nothing.
            - `gtt` — Good-Til-Time. Requires `expires_at`.
        expires_at:
          type: string
          format: date-time
          description: Required when `time_in_force = gtt`; otherwise ignored.
        post_only:
          type: boolean
          default: false
          description: |
            Reject the order if it would cross the book (take liquidity).
            Guarantees maker-side behavior. Invalid with `market` kind.
        reduce_only:
          type: boolean
          default: false
          description: |
            Order may only reduce existing exposure; reject if it would
            increase position.
        visible_quantity:
          type: string
          format: decimal
          description: |
            For iceberg orders. Only this much of `quantity` is visible on the
            book at a time; engine auto-replenishes from the hidden remainder.
            Must be < `quantity` and ≥ min_order_notional equivalent.
        stp_mode:
          type: string
          enum: [cancel_maker, cancel_taker, cancel_both, decrement_taker]
          default: cancel_both
          description: |
            Self-Trade Prevention mode, applied when this order would match
            against the same Staker's resting order.
        allow_synthesis:
          type: boolean
          default: true
          description: |
            Allow the router to use Split+Sell paths to synthesize fills when
            direct book depth is insufficient.
        client_order_id:
          type: string
          description: Optional Staker-side tag for reconciliation.

    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        principal:
          type: string
          description: 0x-prefixed Ethereum address
        worknet_id:
          type: integer
        side:
          type: string
        kind:
          type: string
          enum: [limit, market]
        limit_price:
          type: string
          format: decimal
          nullable: true
        total_quantity:
          type: string
          format: decimal
        filled_quantity:
          type: string
          format: decimal
        visible_quantity:
          type: string
          format: decimal
          nullable: true
        time_in_force:
          type: string
          enum: [gtc, ioc, fok, gtt]
        expires_at:
          type: string
          format: date-time
          nullable: true
        post_only:
          type: boolean
        reduce_only:
          type: boolean
        stp_mode:
          type: string
        status:
          type: string
          enum: [active, partially_filled, filled, cancelled, expired, rejected]
        avg_fill_price:
          type: string
          format: decimal
          nullable: true
        submitted_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true
        rejection_reason:
          type: string
          nullable: true
        client_order_id:
          type: string
          nullable: true
        fills:
          type: array
          items:
            $ref: '#/components/schemas/Fill'

    Fill:
      type: object
