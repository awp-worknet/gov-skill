          format: decimal
        quantity:
          type: string
          format: decimal
        filled_at:
          type: string
          format: date-time

    StakerEpochState:
      type: object
      description: |
        Full per-Epoch state for a Staker. Same shape as the GraphQL
        `StakerEpochState` type (schema.graphql line 122). Returned by
        `GET /v1/principals/{principal}/state`, `POST /v1/positions/split`,
        `POST /v1/positions/merge`, and the corresponding GraphQL resolvers.

        Settlement-populated fields (`pnl`, `a_score`, `closing_chips`,
        `gov_tokens_received`, `epistemic_score_post`) are `null` until the
        settlement pipeline completes for this epoch. See
        `spec/06-persistence.md` §8 for the column lifecycle.
      required:
        - principal
        - epoch_id
        - stake
        - chips_available
        - chips_locked_in_orders
        - max_capital_at_risk
        - positions
      properties:
        principal:
          type: string
          format: eth-address
        epoch_id:
          type: integer
          format: int64
        stake:
          type: string
          format: decimal
          description: s_S, AWP Power at Epoch open
        chips_available:
          type: string
          format: decimal
        chips_locked_in_orders:
          type: string
          format: decimal
        max_capital_at_risk:
          type: string
          format: decimal
          description: Peak capital committed to active trading (chips_locked + chips_in_positions), used for λ_part
        positions:
          type: array
          items:
            type: object
            required: [worknet_id, shares]
            properties:
              worknet_id:
                type: integer
              shares:
                type: string
                format: decimal
        # Settlement-populated (null before settlement):
        pnl:
          type: string
          format: decimal
          nullable: true
        a_score:
          type: string
          format: decimal
          nullable: true
          description: A_S ∈ [0,1], relative prediction accuracy
        lambda_part:
          type: string
          format: decimal
          nullable: true
        closing_chips:
          type: string
          format: decimal
          nullable: true
        gov_tokens_received:
          type: string
          format: decimal
          nullable: true
        epistemic_score_post:
          type: string
          format: decimal
          nullable: true
          description: E_S^(t) after settlement update

    PrincipalPower:
