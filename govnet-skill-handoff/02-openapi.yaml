    # =========================================================================
    # ADR-014 schemas — problem+json, pagination, async write receipts
    # =========================================================================

    Problem:
      type: object
      description: |
        RFC 7807 `application/problem+json` error envelope. Every 4xx response
        uses this schema. `type` is the canonical problem URL; `code` is the
        stable machine-readable code from the ADR-006 codebook.
      required: [type, title, status, code]
      properties:
        type:
          type: string
          format: uri
          description: Canonical problem-type URL (stable; safe to dispatch on)
          example: https://emg.awp.network/problems/insufficient-balance
        title:
          type: string
          description: Human-readable summary; stable across versions
          example: Insufficient available chips
        status:
          type: integer
          example: 422
        code:
          type: string
          description: Stable machine-readable code (ADR-006 codebook)
          example: INSUFFICIENT_BALANCE
        detail:
          type: string
          description: Instance-specific detail about this occurrence
        instance:
          type: string
          description: URI reference identifying the specific occurrence
        request_id:
          type: string
          description: Server-assigned request ID for log correlation
      additionalProperties: true

    Pagination:
      type: object
      description: Cursor-based pagination envelope (ADR-014 §4)
      required: [has_more, limit]
      properties:
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for next page; null if no more pages
        has_more:
          type: boolean
          description: Whether additional pages exist
        limit:
          type: integer
          description: Page size that was applied (may be capped below requested)

    OrderAcceptedResponse:
      type: object
      description: |
        Response to `POST /v1/orders`. Returned with HTTP `202 Accepted`. Represents
        a durable acknowledgement that the matcher has persisted the order to WAL
        (ADR-012). Subsequent fills arrive via WebSocket `fills.me`.
      required:
        - order_id
        - status
        - initial_fills
        - remaining_quantity
        - accepted_at
      properties:
        order_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [accepted, filled, partially_filled, rejected]
          description: |
            Initial status after WAL commit. `filled` / `partially_filled` occur when
            the incoming order crossed resting liquidity synchronously.
        initial_fills:
          type: array
          description: Fills executed synchronously during intake; may be empty
          items:
            $ref: '#/components/schemas/Fill'
        remaining_quantity:
          type: string
          format: decimal
          description: Quantity remaining in the book after synchronous fills
        accepted_at:
          type: string
          format: date-time

    CancelReceipt:
      type: object
      description: |
        Response to `DELETE /v1/orders/{id}` and each element in
        `POST /v1/orders/cancel-batch`. Always `200` HTTP status; inspect
        `status` for actual outcome. See ADR-014 §2.
      required:
        - order_id
        - status
        - cancelled_quantity
        - final_filled_quantity
        - cancel_processed_at
      properties:
        order_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - cancelled
            - partially_filled_then_cancelled
            - already_fully_filled
            - already_cancelled
        cancelled_quantity:
          type: string
          format: decimal
          description: Quantity removed from the book by this cancel request
        final_filled_quantity:
          type: string
          format: decimal
          description: Cumulative fills at the time cancel resolved
        last_fill_at:
          type: string
          format: date-time
          nullable: true
        cancel_processed_at:
          type: string
          format: date-time

    CancelBatchError:
      type: object
      description: |
        Per-id failure row in the `POST /v1/orders/cancel-batch`
        results array. Distinct from `CancelReceipt` — the absence
        of `status` / `cancelled_quantity` / `final_filled_quantity`
        / `cancel_processed_at` is the structural distinguisher.
        Clients can detect this shape via the presence of the
        `code` field, which `CancelReceipt` never carries.
      required: [order_id, code, detail]
      properties:
        order_id:
          type: string
          format: uuid
        code:
          type: string
          description: |
            §9.5.1 codebook entry for the per-id failure. Most common
            values: `BUSINESS_ORDER_NOT_FOUND`, `BUSINESS_ORDER_NOT_OWNED`.
        detail:
          type: string
          description: Human-readable diagnostic from the error envelope.
